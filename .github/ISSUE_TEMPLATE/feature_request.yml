name: Feature request
description: Suggest a new tool, filter or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: I want my agent to track price drops on a saved search...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: A new tool? A new parameter on an existing tool?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
